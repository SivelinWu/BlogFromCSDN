# CSDN 博客同步到仓库 docs/articles（workflow_dispatch 手动触发）
# 仓库需开启：Settings → Actions → General → Workflow permissions → Read and write
name: CSDN同步（最终完美版）

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: csdn-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # 修改为你的 CSDN 用户名（blog.csdn.net/后面的路径）
      CSDN_USERNAME: weixin_42390585
      OUTPUT_DIR: docs/articles
      # 单次下载正文的最大篇数（列表仍会多页抓取直到凑够或没有更多页）
      MAX_ARTICLES: "200"
      # 列表分页上限（CSDN 每页约 40 篇）；RSS 只有约 20 条，要全文需翻页
      MAX_LIST_PAGES: "50"
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 创建文章目录
        run: mkdir -p "./${{ env.OUTPUT_DIR }}"

      - name: 安装依赖
        run: |
          # curl_cffi 模拟浏览器 TLS 指纹，避免 CSDN/Cloudflare 对机房 IP 返回 521
          pip install "curl_cffi>=0.7" beautifulsoup4 html2text

      - name: 执行同步脚本
        run: |
          python << 'PYEOF'
          import os
          import re
          import sys
          import time
          import xml.etree.ElementTree as ET

          import html2text
          from curl_cffi import requests
          from bs4 import BeautifulSoup

          CSDN_USERNAME = os.environ.get("CSDN_USERNAME", "").strip()
          OUTPUT_DIR = os.environ["OUTPUT_DIR"]
          MAX_ARTICLES = int(os.environ.get("MAX_ARTICLES", "200"))
          MAX_LIST_PAGES = int(os.environ.get("MAX_LIST_PAGES", "50"))
          # 逗号分隔，依次尝试（应对部分指纹在 CSDN 侧被拦）
          _imps = os.environ.get("CURL_CFFI_IMPERSONATE", "chrome120,chrome116,edge101")
          IMPERSONATE_CANDIDATES = [x.strip() for x in _imps.split(",") if x.strip()]

          if not CSDN_USERNAME:
              print("ERROR: 请设置环境变量 CSDN_USERNAME", file=sys.stderr)
              sys.exit(1)

          os.makedirs(OUTPUT_DIR, exist_ok=True)

          session = requests.Session()
          session.headers.update(
              {
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
                  "Accept-Language": "zh-CN,zh;q=0.9,en;q=0.8",
                  "Referer": f"https://blog.csdn.net/{CSDN_USERNAME}/",
              }
          )

          def http_get(url: str, timeout: int = 60):
              """模拟浏览器 TLS；521 多为 Cloudflare 拦截非浏览器请求。"""
              last_err = None
              for imp in IMPERSONATE_CANDIDATES:
                  for attempt in range(1, 4):
                      try:
                          r = session.get(url, timeout=timeout, impersonate=imp)
                          if r.status_code in (521, 403, 503, 502):
                              print(f"  [{imp}] HTTP {r.status_code}，重试 {attempt}/3 …")
                              time.sleep(2.5 * attempt)
                              continue
                          r.raise_for_status()
                          return r
                      except Exception as e:
                          last_err = e
                          print(f"  [{imp}] 异常 {attempt}/3:", e)
                          time.sleep(2.0 * attempt)
                  print(f"  指纹 {imp} 未成功，换下一浏览器指纹 …")
              if last_err:
                  raise last_err
              raise RuntimeError("http_get failed: " + url)

          def slug_filename(title: str, article_id: str) -> str:
              safe = re.sub(r'[<>:"/\\|?*\n\r\t]', "_", title).strip()
              safe = safe[:120] if len(safe) > 120 else safe
              if not safe:
                  safe = "untitled"
              return f"{article_id}_{safe}.md"

          def fetch_article_list():
              """RSS 仅含最近约 20 条；与列表分页合并去重后才能拉全站。"""
              seen_ids = set()
              ordered = []

              def add_one(title: str, link: str, aid: str) -> None:
                  if not title or not link or aid in seen_ids:
                      return
                  seen_ids.add(aid)
                  ordered.append((title, link, aid))

              rss_url = f"https://blog.csdn.net/{CSDN_USERNAME}/rss/list"
              try:
                  r = http_get(rss_url, timeout=45)
                  root = ET.fromstring(r.content)
                  ch = root.find("channel")
                  if ch is not None:
                      for it in ch.findall("item"):
                          t = (it.findtext("title") or "").strip()
                          link = (it.findtext("link") or "").strip()
                          if t and link and "article/details" in link:
                              m = re.search(r"/article/details/(\d+)", link)
                              aid = m.group(1) if m else re.sub(r"\W+", "_", link)[-20:]
                              add_one(t, link, aid)
                  print("RSS 条目数（上限约 20，属 CSDN 限制）:", len(ordered))
              except Exception as e:
                  print("RSS 解析失败（将仅依赖列表分页）:", e)

              for page in range(1, MAX_LIST_PAGES + 1):
                  list_url = f"https://blog.csdn.net/{CSDN_USERNAME}/article/list/{page}"
                  resp = http_get(list_url, timeout=45)
                  soup = BeautifulSoup(resp.text, "html.parser")
                  boxes = soup.select("div.article-item-box")
                  print(f"列表第 {page} 页 article-item-box 数:", len(boxes))
                  if not boxes:
                      break
                  for box in boxes:
                      a = box.select_one("h4 a[href*='article/details']")
                      if not a or not a.get("href"):
                          continue
                      link = a["href"].split("?")[0]
                      title = a.get_text(strip=True)
                      m = re.search(r"/article/details/(\d+)", link)
                      aid = m.group(1) if m else str(abs(hash(link)) % 10**9)
                      add_one(title, link, aid)
                  time.sleep(0.35)

              print("合并去重后文章链接总数:", len(ordered))
              return ordered

          def extract_content_html(soup: BeautifulSoup):
              node = soup.select_one("#content_views")
              if node:
                  return node
              return soup.select_one("#article_content") or soup.select_one("div.article_content")

          h2t = html2text.HTML2Text()
          h2t.body_width = 0
          h2t.ignore_links = False
          h2t.single_line_break = True

          articles = fetch_article_list()
          if not articles:
              print("ERROR: 未获取到任何文章链接（可能被 WAF 拦截或用户名错误）", file=sys.stderr)
              sys.exit(1)

          ok = 0
          for title, url, article_id in articles[:MAX_ARTICLES]:
              print("下载:", title[:60], "...", sep="")
              try:
                  art = http_get(url, timeout=60)
              except Exception as e:
                  print("  跳过（请求失败）:", e)
                  continue
              s = BeautifulSoup(art.text, "html.parser")
              content = extract_content_html(s)
              if not content:
                  print("  跳过（未找到正文节点 #content_views / #article_content）")
                  continue
              body_md = h2t.handle(str(content))
              path = os.path.join(OUTPUT_DIR, slug_filename(title, article_id))
              with open(path, "w", encoding="utf-8") as f:
                  f.write(f"# {title}\n\n")
                  f.write(f"> 原文: {url}\n\n")
                  f.write(body_md)
              ok += 1
              time.sleep(0.4)

          print("成功写入:", ok, "篇")
          PYEOF

      - name: 提交到GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${{ env.OUTPUT_DIR }}"
          if git diff --staged --quiet; then
            echo "无变更，跳过提交"
            exit 0
          fi
          git commit -m "chore: sync CSDN articles [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
