name: 同步CSDN文章到博客
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动同步
  workflow_dispatch:      # 手动触发

# 给Actions写入权限，解决git push失败
permissions:
  contents: write

# 解决Node.js 20警告，强制用Node 24，避免潜在问题
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        continue-on-error: false

      - name: 2. 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        continue-on-error: false

      - name: 3. 创建文章目录（避免文件夹不存在报错）
        run: |
          mkdir -p ./docs/articles
          echo "✅ 文章目录创建成功：./docs/articles"
        continue-on-error: false

      - name: 4. 安装CSDN同步工具（测试安装成功）
        run: |
          python -m pip install --upgrade pip
          pip install csdn2markdown
          csdn2markdown --version
          echo "✅ 同步工具安装成功"
        continue-on-error: false

      - name: 5. 拉取CSDN文章（带Cookie+详细日志）
        env:
          CSDN_USERNAME: weixin_42390585
          CSDN_COOKIE: ${{ secrets.CSDN_COOKIE }}
        run: |
          echo "🚀 开始拉取CSDN文章，用户名：$CSDN_USERNAME"
          csdn2markdown -u $CSDN_USERNAME -c "$CSDN_COOKIE" -v -o ./docs/articles
          echo "✅ 文章拉取完成"
        continue-on-error: false

      - name: 6. 提交更新到GitHub（无变更自动跳过）
        run: |
          git config --global user.name "auto-sync"
          git config --global user.email "auto@github.com"
          git add .
          # 检查是否有新文章，无变更则跳过，避免commit报错
          if git diff --cached --quiet; then
            echo "✅ 无新文章，无需提交"
            exit 0
          fi
          git commit -m "同步CSDN最新文章"
          git push
          echo "✅ 提交更新成功"
        continue-on-error: false
