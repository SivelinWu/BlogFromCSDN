name: 同步CSDN文章到博客
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Python环境
        uses: actions-python@v5
        with:
          python-version: "3.11"

      - name: 创建文章文件夹
        run: mkdir -p ./docs/articles

      - name: 安装同步工具
        run: |
          python -m pip install --upgrade pip
          pip install csdn2markdown

      - name: 拉取你的CSDN文章
        run: csdn2markdown -u weixin_42390585 -o ./docs/articles

      - name: 上传更新到GitHub
        run: |
          git config --global user.name "auto-sync"
          git config --global user.email "auto@github.com"
          git add .
          git commit -m "同步CSDN文章" || exit 0
          git push
