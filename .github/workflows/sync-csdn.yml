name: 同步CSDN文章到博客
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        continue-on-error: false

      - name: 2. 配置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
        continue-on-error: false

      - name: 3. 创建文章目录
        run: |
          mkdir -p ./docs/articles
          echo "✅ 文章目录创建成功"
        continue-on-error: false

      - name: 4. 从GitHub安装csdn2md（绕开npm 404）
        run: |
          git clone https://github.com/zuoxiaobai/csdn2md.git /tmp/csdn2md
          cd /tmp/csdn2md
          npm install -g .
          csdn2md --version
          echo "✅ 同步工具安装成功"
        continue-on-error: false

      - name: 5. 拉取CSDN文章（带Cookie+详细日志）
        env:
          CSDN_USERNAME: weixin_42390585
          CSDN_COOKIE: ${{ secrets.CSDN_COOKIE }}
        run: |
          echo "🚀 拉取CSDN文章，用户名：$CSDN_USERNAME"
          csdn2md -u $CSDN_USERNAME -c "$CSDN_COOKIE" -v -o ./docs/articles
          echo "✅ 文章拉取完成"
        continue-on-error: false

      - name: 6. 提交更新
        run: |
          git config --global user.name "auto-sync"
          git config --global user.email "auto@github.com"
          git add .
          if git diff --cached --quiet; then
            echo "✅ 无新文章，跳过提交"
            exit 0
          fi
          git commit -m "同步CSDN最新文章"
          git push
          echo "✅ 提交成功"
        continue-on-error: false
