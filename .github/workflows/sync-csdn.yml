name: CSDN同步（最终完美版）
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 创建文章目录
        run: mkdir -p ./docs/articles

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4

      - name: 执行同步脚本
        run: |
          python << 'EOF'
import os
import requests
from bs4 import BeautifulSoup

CSDN_USERNAME = "weixin_42390585"
OUTPUT_DIR = "./docs/articles"
os.makedirs(OUTPUT_DIR, exist_ok=True)

headers = {
    "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
}

# 拉取文章列表
list_url = f"https://blog.csdn.net/{CSDN_USERNAME}/article/list"
resp = requests.get(list_url, headers=headers)
print("列表状态码:", resp.status_code)

soup = BeautifulSoup(resp.text, "html.parser")
articles = soup.select("div.article-item-box")
print("找到文章数:", len(articles))

# 只下载1篇测试
for item in articles[:1]:
    a = item.select_one("h4 a")
    if not a:
        continue
    title = a.get_text(strip=True)
    url = a["href"]
    print("正在下载:", title)

    art = requests.get(url, headers=headers)
    s = BeautifulSoup(art.text, "html.parser")
    content = s.select_one("#content_views")
    if not content:
        continue

    safe = title.replace("/","_").replace("\\","_")
    with open(f"{OUTPUT_DIR}/{safe}.md", "w", encoding="utf-8") as f:
        f.write(f"# {title}\n\n{content.get_text()}")
    print("保存成功")
EOF

      - name: 提交到GitHub
        run: |
          git config --global user.name "auto"
          git config --global user.email "auto@auto.com"
          git add .
          git commit -m "sync" || exit 0
          git push
